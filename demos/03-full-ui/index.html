<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>gmux · Full UI</title>
<style>
:root {
  --bg:         #07090f;
  --surface:    #0d1117;
  --card:       #0f1419;
  --border:     rgba(255,255,255,0.06);
  --border-hi:  rgba(255,255,255,0.10);
  --muted:      #6e7681;
  --text:       #e6edf3;
  --accent:     #6c5ce7;
  --accent-rgb: 108,92,231;
  --cyan:       #00d2ff;
  --cyan-rgb:   0,210,255;
  --orange:     #ff6b35;
  --waiting:    #ef4444;
  --working:    #22c55e;
  --permission: #f97316;
  --done:       #3b82f6;
  --error:      #ef4444;
  --idle:       #4b5563;

  --glass-bg:     rgba(13,17,23,0.82);
  --glass-blur:   blur(14px) saturate(180%);
  --glass-border: 1px solid rgba(255,255,255,0.07);
  --glass-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 4px 16px rgba(0,0,0,0.5);

  --topbar-h:    48px;
  --statusbar-h: 26px;
  --sidebar-w:   220px;
  --pip-w:       260px;
  --card-radius: 10px;
  --row-height:  32px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body {
  width: 100%; height: 100%;
  background: var(--bg); color: var(--text);
  font-family: 'SF Pro Text','Inter',system-ui,sans-serif;
  font-size: 13px; overflow: hidden; user-select: none;
}

/* ── App shell ── */
#app {
  display: grid;
  grid-template-rows: var(--topbar-h) 1fr var(--statusbar-h);
  height: 100vh; overflow: hidden;
}

/* ── Topbar ── */
#topbar {
  display: flex; align-items: center; gap: 6px; padding: 0 14px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: var(--glass-border);
}
.brand {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 800; letter-spacing: -0.03em;
  padding-right: 14px; border-right: 1px solid var(--border); margin-right: 4px; flex-shrink: 0;
}
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 10px var(--accent);
  animation: pulse-glow 2.5s ease-in-out infinite;
}
@keyframes pulse-glow { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.35)} }
#window-tabs {
  display: flex; gap: 2px; flex: 1;
  overflow-x: auto; scrollbar-width: none; padding: 0 6px;
}
#window-tabs::-webkit-scrollbar { display: none; }
.win-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 0 10px; height: 28px; border-radius: 5px;
  border: 1px solid transparent; color: var(--muted);
  font-size: 11px; font-weight: 500; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  transition: all 120ms ease; background: none; font-family: inherit;
}
.win-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.win-tab.active { color: var(--text); background: rgba(255,255,255,0.06); border-color: var(--border-hi); }
.state-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition: all 300ms ease; }
#topbar-right {
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0; margin-left: 6px; padding-left: 10px; border-left: 1px solid var(--border);
}
.ctrl-btn {
  padding: 4px 10px; border-radius: 5px;
  border: 1px solid var(--border); color: var(--muted);
  font-family: inherit; font-size: 11px; font-weight: 600;
  background: none; cursor: pointer; transition: all 120ms ease;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--border-hi); }
.ctrl-btn.active { color: #a78bfa; border-color: rgba(167,139,250,0.35); background: rgba(108,92,231,0.12); }
.ctrl-btn.listening { color: #f87171; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); animation: listen-pulse 1s ease-in-out infinite; }
@keyframes listen-pulse { 0%,100%{box-shadow:0 0 4px rgba(239,68,68,.3)} 50%{box-shadow:0 0 12px rgba(239,68,68,.6)} }

/* ── Main ── */
#main { display: flex; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface); border-right: var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-section-label {
  padding: 14px 14px 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted);
}
#agent-list { flex: 1; overflow-y: auto; padding-bottom: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.sidebar-agent {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; height: var(--row-height); cursor: pointer;
  transition: background 100ms ease;
}
.sidebar-agent:hover { background: rgba(255,255,255,0.03); }
.sidebar-agent.selected { background: rgba(108,92,231,0.1); }
.sidebar-agent.voice-target { background: rgba(239,68,68,0.08); }
.sa-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sa-name { flex:1; font-size:12px; font-weight:500; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sa-badge { font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; flex-shrink:0; }
.sa-badge.permission { background:rgba(249,115,22,0.14); color:var(--permission); }
.sa-mic { font-size:10px; flex-shrink:0; opacity:0; transition:opacity 200ms; }
.sidebar-agent.voice-target .sa-mic { opacity:1; }

/* ── Content ── */
#content { flex:1; overflow: auto; padding:14px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
#fleet-grid {
  display: grid;
  gap: 9px;
}
#fleet-grid.layout-fleet  { grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); }
#fleet-grid.layout-focus  { grid-template-columns: 1fr; max-width: 560px; margin: 0 auto; }
#fleet-grid.layout-pair   { grid-template-columns: 1fr 1fr; }
#fleet-grid.layout-review { grid-template-columns: 2fr 1fr; }
#fleet-grid.layout-review .agent-card:first-child { grid-row: span 3; }

/* ── Agent card ── */
.agent-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--card-radius); padding: 13px 15px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 200ms ease, box-shadow 200ms ease, transform 100ms ease;
}
.agent-card:hover { transform: translateY(-1px); border-color: var(--border-hi); }
.agent-card[data-state="waiting"]    { border-color:rgba(239,68,68,.22);  box-shadow:0 0 0 1px rgba(239,68,68,.1),  0 0 20px rgba(239,68,68,.05); }
.agent-card[data-state="working"]    { border-color:rgba(34,197,94,.18);  box-shadow:0 0 0 1px rgba(34,197,94,.07); }
.agent-card[data-state="permission"] { border-color:rgba(249,115,22,.32); box-shadow:0 0 0 1px rgba(249,115,22,.13),0 0 22px rgba(249,115,22,.07); animation:perm-pulse 1.8s ease-in-out infinite; }
@keyframes perm-pulse { 0%,100%{box-shadow:0 0 0 1px rgba(249,115,22,.13),0 0 18px rgba(249,115,22,.07)} 50%{box-shadow:0 0 0 1px rgba(249,115,22,.28),0 0 26px rgba(249,115,22,.12)} }
.agent-card[data-state="done"]  { border-color:rgba(59,130,246,.16); box-shadow:0 0 0 1px rgba(59,130,246,.07); }
.agent-card[data-state="error"] { border-color:rgba(239,68,68,.38);  box-shadow:0 0 0 1px rgba(239,68,68,.18),0 0 22px rgba(239,68,68,.09); }
.agent-card.selected {
  border-color:rgba(108,92,231,.45) !important;
  box-shadow:0 0 0 1px rgba(108,92,231,.22) !important, 0 0 28px rgba(108,92,231,.1) !important;
}
.agent-card.voice-target::after {
  content:''; position:absolute; top:0;left:0;right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--waiting), transparent);
  animation: voice-sweep 1.2s ease-in-out infinite;
}
@keyframes voice-sweep { 0%,100%{opacity:.5} 50%{opacity:1} }
.card-header { display:flex; align-items:center; gap:7px; margin-bottom:9px; }
.card-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all 300ms ease; }
.card-name { flex:1; font-size:13px;font-weight:700;letter-spacing:-0.01em;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.card-badge { font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:4px;flex-shrink:0; }
.card-perm-btn { font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;border:1px solid rgba(249,115,22,.4);background:rgba(249,115,22,.12);color:#fb923c;cursor:pointer;font-family:inherit;transition:all 120ms ease;flex-shrink:0; }
.card-perm-btn:hover { background:rgba(249,115,22,.25); }
.card-progress { margin-bottom:9px; }
.progress-meta { display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px; }
.progress-track { height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden; }
.progress-fill { height:100%;border-radius:2px;background:var(--accent);transition:width 500ms cubic-bezier(.4,0,.2,1); }
.progress-fill.working { background:var(--working); }
.card-metrics { display:flex;gap:14px;margin-bottom:9px; }
.metric-label { font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase; }
.metric-value { font-size:12px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums; }
.metric-value.hot { color:var(--waiting); }
.card-activity { font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;min-height:16px; }
.act-dot { width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--muted); }
.act-dot.working { background:var(--working);animation:act-blink 1s ease-in-out infinite; }
@keyframes act-blink { 0%,100%{opacity:1}50%{opacity:.4} }
.act-text { overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
@keyframes working-dot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 3px rgba(34,197,94,0)} }

/* ── Gesture PiP panel ── */
#gesture-pip {
  width: var(--pip-w); flex-shrink: 0;
  background: var(--surface); border-left: var(--glass-border);
  display: flex; flex-direction: column;
}
#pip-header {
  padding: 10px 14px 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted);
  border-bottom: var(--glass-border);
  display: flex; align-items: center; justify-content: space-between;
}
#pip-toggle { font-size:11px; font-weight:600; color:var(--muted); cursor:pointer; background:none; border:none; font-family:inherit; }
#pip-toggle:hover { color:var(--text); }

/* Camera view */
#pip-camera { position: relative; flex-shrink: 0; }
#pip-video {
  width: 100%; aspect-ratio: 4/3; object-fit: cover;
  transform: scaleX(-1); background: #000; display: block;
  opacity: 0.5;
}
#pip-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
}
/* Extended zone ring around PiP */
#pip-camera::after {
  content: '';
  position: absolute; inset: -8px;
  border: 1px dashed rgba(108,92,231,0.18); border-radius: 6px;
  pointer-events: none;
}
#pip-camera.edge-active::after { border-color: rgba(108,92,231,0.5); }

#pip-no-cam {
  width: 100%; aspect-ratio: 4/3;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  background: #0a0d12;
}
#pip-no-cam p { font-size:11px; color:var(--muted); text-align:center; line-height:1.5; }
#pip-enable-btn { padding:6px 14px; border-radius:6px; border:var(--glass-border); background:rgba(108,92,231,.15); color:var(--accent); font-family:inherit; font-size:11px; font-weight:700; cursor:pointer; }
#pip-enable-btn:hover { background:rgba(108,92,231,.25); }

/* Gesture HUD below camera */
#pip-hud { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
.pip-hand-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.025); border: 1px solid var(--border);
}
.pip-hand-label { font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;width:36px;flex-shrink:0; }
.pip-hand-label.left  { color:var(--accent); }
.pip-hand-label.right { color:var(--cyan); }
.pip-gesture { flex:1;font-size:12px;font-weight:600;color:var(--text); }
.pip-conf-wrap { width:44px;height:3px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden; }
.pip-conf-fill { height:100%;border-radius:2px;background:var(--accent);transition:width 80ms ease; }
.pip-conf-fill.high { background:var(--working); }
.pip-conf-fill.mid  { background:#eab308; }
.pip-conf-fill.low  { background:var(--waiting); }

/* Action toast in pip */
#pip-action {
  margin: 0 14px 10px;
  padding: 6px 12px; border-radius: 7px;
  font-size: 11px; font-weight: 600; color: var(--text);
  background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.25);
  opacity: 0; transition: opacity 200ms ease; text-align: center;
  min-height: 30px; display: flex; align-items: center; justify-content: center;
}
#pip-action.show { opacity: 1; }

/* Voice target indicator */
#voice-target-row {
  margin: 0 14px 12px;
  padding: 7px 12px; border-radius: 8px;
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
  display: none; align-items: center; gap: 8px;
}
#voice-target-row.active { display: flex; }
.vt-dot { width:7px;height:7px;border-radius:50%;background:var(--waiting);animation:act-blink 1s ease-in-out infinite; }
.vt-label { font-size:11px;color:var(--muted); }
.vt-name  { font-size:12px;font-weight:700;color:var(--text); }

/* ── Status bar ── */
#statusbar {
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  background: var(--surface); border-top: var(--glass-border);
  font-size: 11px; color: var(--muted);
}
.sb-sep { width:1px; height:14px; background:var(--border); }
kbd { background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:3px; padding:0 4px; font-family:monospace; font-size:10px; color:var(--muted); }
@keyframes working-dot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 3px rgba(34,197,94,0)} }
.bg-waiting    { background:rgba(239,68,68,.12);  color:var(--waiting); }
.bg-working    { background:rgba(34,197,94,.12);  color:var(--working); }
.bg-permission { background:rgba(249,115,22,.14); color:var(--permission); }
.bg-done       { background:rgba(59,130,246,.12); color:var(--done); }
.bg-error      { background:rgba(239,68,68,.14);  color:var(--error); }
.bg-idle       { background:rgba(75,85,99,.15);   color:var(--muted); }
</style>
</head>
<body>
<div id="app">

  <!-- Topbar -->
  <div id="topbar">
    <div class="brand"><div class="brand-dot"></div>gmux</div>
    <div id="layout-btns" style="display:flex;gap:2px;flex-shrink:0;padding-right:6px;border-right:1px solid var(--border);margin-right:2px;">
      <button class="ctrl-btn active" id="lb-fleet"  onclick="setLayoutBtn('fleet')">Fleet</button>
      <button class="ctrl-btn"        id="lb-focus"  onclick="setLayoutBtn('focus')">Focus</button>
      <button class="ctrl-btn"        id="lb-pair"   onclick="setLayoutBtn('pair')">Pair</button>
      <button class="ctrl-btn"        id="lb-review" onclick="setLayoutBtn('review')">Review</button>
    </div>
    <div id="window-tabs"></div>
    <div id="topbar-right">
      <button class="ctrl-btn" id="btn-gesture" onclick="toggleGesture()">✋ Gesture</button>
      <button class="ctrl-btn" id="btn-voice"   onclick="toggleVoice()">🎙 Voice</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section-label">Agents</div>
      <div id="agent-list"></div>
    </div>

    <!-- Fleet -->
    <div id="content">
      <div id="fleet-grid" class="layout-fleet"></div>
    </div>

    <!-- Gesture PiP panel -->
    <div id="gesture-pip">
      <div id="pip-header">
        <span>Gesture</span>
        <button id="pip-toggle" onclick="togglePip()">hide</button>
      </div>

      <div id="pip-camera">
        <video id="pip-video" autoplay playsinline muted></video>
        <canvas id="pip-canvas"></canvas>
        <div id="pip-no-cam">
          <p>Camera off<br>Enable to use gestures</p>
          <button id="pip-enable-btn" onclick="startGestureCamera()">Enable Camera</button>
        </div>
      </div>

      <div id="pip-hud">
        <div class="pip-hand-row">
          <span class="pip-hand-label right">Right</span>
          <span class="pip-gesture" id="pip-right">—</span>
          <div class="pip-conf-wrap"><div class="pip-conf-fill" id="pip-right-conf" style="width:0"></div></div>
        </div>
        <div class="pip-hand-row">
          <span class="pip-hand-label left">Left</span>
          <span class="pip-gesture" id="pip-left">—</span>
          <div class="pip-conf-wrap"><div class="pip-conf-fill" id="pip-left-conf" style="width:0"></div></div>
        </div>
      </div>

      <div id="pip-action"></div>

      <div id="voice-target-row">
        <span class="vt-dot"></span>
        <span class="vt-label">voice →</span>
        <span class="vt-name" id="vt-name">—</span>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span>session · default</span>
    <div class="sb-sep"></div>
    <span id="sb-summary"></span>
    <div class="sb-sep"></div>
    <span id="sb-count"></span>
    <span style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <kbd>←→</kbd>switch <kbd>J</kbd>jump <kbd>L</kbd>layout <kbd>G</kbd>gesture <kbd>V</kbd>voice
    </span>
  </div>
</div>

<script type="module">
import { GestureEngine }   from '../../shared/gesture-engine.js';
import { GestureRenderer } from '../../shared/gesture-renderer.js';

// ── Mock data ──────────────────────────────────────────────────────────
const AGENTS = [
  { id:'a1', name:'volkus',   state:'working',    todos:[6,8], ram:'1.2 GB', tokens:'847k', tool:'bash: node build.js',    window:1 },
  { id:'a2', name:'sadiya',   state:'waiting',    todos:[3,5], ram:'780 MB', tokens:'312k', tool:null,                     window:2 },
  { id:'a3', name:'research', state:'permission', todos:[2,4], ram:'540 MB', tokens:'1.1m', tool:'edit: src/main.rs',       window:3 },
  { id:'a4', name:'deepseek', state:'working',    todos:[7,9], ram:'2.1 GB', tokens:'2.3m', tool:'glob: src/**/*.ts',       window:4 },
  { id:'a5', name:'deploy',   state:'done',       todos:[5,5], ram:'3.4 GB', tokens:'430k', tool:null,                     window:5 },
  { id:'a6', name:'gemini',   state:'idle',       todos:[0,0], ram:'220 MB', tokens:'0',    tool:null,                     window:6 },
  { id:'a7', name:'haiku',    state:'working',    todos:[1,3], ram:'890 MB', tokens:'156k', tool:'read: GESTURES.md',       window:7 },
];
const SC = { waiting:'#ef4444', working:'#22c55e', permission:'#f97316', done:'#3b82f6', error:'#ef4444', idle:'#4b5563', not_started:'#4b5563' };
const col = s => SC[s]||'#4b5563';

let selectedId   = 'a1';
let voiceTarget  = null;
let gestureOn    = false;
let voiceOn      = false;
let pipVisible   = true;

// ── Render ─────────────────────────────────────────────────────────────
function render() { renderTabs(); renderSidebar(); renderFleet(); renderStatusBar(); renderVoiceTarget(); }

function renderTabs() {
  document.getElementById('window-tabs').innerHTML = AGENTS.map(a =>
    `<button class="win-tab ${a.id===selectedId?'active':''}" onclick="window._select('${a.id}')">
      <span class="state-dot" style="background:${col(a.state)};${a.state==='working'?'animation:working-dot 1.4s ease-in-out infinite':''}"></span>
      ${a.window}·${a.name}
    </button>`).join('');
}

function renderSidebar() {
  document.getElementById('agent-list').innerHTML = AGENTS.map(a => {
    const perm = a.state === 'permission' ? '<span class="sa-badge permission">!</span>' : '';
    return `<div class="sidebar-agent ${a.id===selectedId?'selected':''} ${a.id===voiceTarget?'voice-target':''}"
      onclick="window._select('${a.id}')">
      <span class="sa-dot" style="background:${col(a.state)}"></span>
      <span class="sa-name">${a.name}</span>
      ${perm}
      <span class="sa-mic">🎙</span>
    </div>`;
  }).join('');
}

function renderFleet() {
  document.getElementById('fleet-grid').innerHTML = AGENTS.map(a => {
    const done = a.todos[0], total = a.todos[1];
    const pct  = total > 0 ? (done/total*100).toFixed(0) : 0;
    const permBtn = a.state==='permission'
      ? `<button class="card-perm-btn" onclick="event.stopPropagation();approvePerm('${a.id}')">! Approve</button>` : '';
    const badge = a.state !== 'permission'
      ? `<span class="card-badge bg-${a.state}">${a.state}</span>` : '';
    return `<div class="agent-card ${a.id===selectedId?'selected':''} ${a.id===voiceTarget?'voice-target':''}"
      data-state="${a.state}" onclick="window._select('${a.id}')">
      <div class="card-header">
        <span class="card-dot" style="background:${col(a.state)};${a.state==='working'?'animation:working-dot 1.4s ease-in-out infinite':''}"></span>
        <span class="card-name">${a.name}</span>
        ${permBtn || badge}
      </div>
      ${total>0?`<div class="card-progress">
        <div class="progress-meta"><span>Todos</span><span>${done}/${total}</span></div>
        <div class="progress-track"><div class="progress-fill ${a.state==='working'?'working':''}" style="width:${pct}%"></div></div>
      </div>`:''}
      <div class="card-metrics">
        <div><div class="metric-label">RAM</div><div class="metric-value ${parseFloat(a.ram)>2?'hot':''}">${a.ram}</div></div>
        <div><div class="metric-label">Tokens</div><div class="metric-value">${a.tokens}</div></div>
      </div>
      <div class="card-activity">
        <span class="act-dot ${a.state==='working'?'working':''}"></span>
        <span class="act-text">${a.tool||'—'}</span>
      </div>
    </div>`;
  }).join('');
}

function renderStatusBar() {
  const counts = {};
  AGENTS.forEach(a => counts[a.state]=(counts[a.state]||0)+1);
  const parts = ['waiting','permission','working','done','error'].filter(s=>counts[s])
    .map(s=>`<span style="color:${col(s)}">${counts[s]} ${s}</span>`).join(' · ');
  document.getElementById('sb-summary').innerHTML = parts;
  document.getElementById('sb-count').textContent = `${AGENTS.length} agents`;
}

function renderVoiceTarget() {
  const row = document.getElementById('voice-target-row');
  if (voiceTarget && voiceOn) {
    row.classList.add('active');
    const a = AGENTS.find(x=>x.id===voiceTarget);
    document.getElementById('vt-name').textContent = a ? a.name : '—';
  } else {
    row.classList.remove('active');
  }
}

// ── Controls ──────────────────────────────────────────────────────────
window._select = id => { selectedId = id; if (voiceOn) { voiceTarget = id; } render(); };
window.approvePerm = id => { const a=AGENTS.find(x=>x.id===id); if(a){a.state='working';a.tool='bash: running...';render();} };
window.setLayoutBtn = function(name) {
  document.getElementById('fleet-grid').className = 'layout-' + name;
  ['fleet','focus','pair','review'].forEach(n => {
    document.getElementById('lb-' + n).classList.toggle('active', n === name);
  });
  window._layoutIdx = ['fleet','focus','pair','review'].indexOf(name);
  pipAction('layout → ' + name, 'var(--muted)');
};

window.toggleGesture = function() {
  gestureOn = !gestureOn;
  const btn = document.getElementById('btn-gesture');
  btn.classList.toggle('active', gestureOn);
  if (gestureOn && !stream) startGestureCamera();
};
window.toggleVoice = function() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('btn-voice');
  btn.classList.toggle('active', voiceOn);
  btn.classList.toggle('listening', voiceOn);
  if (voiceOn) voiceTarget = selectedId;
  else voiceTarget = null;
  renderVoiceTarget();
  renderSidebar();
};
window.togglePip = function() {
  pipVisible = !pipVisible;
  document.getElementById('gesture-pip').style.display = pipVisible ? '' : 'none';
  document.getElementById('pip-toggle').textContent = pipVisible ? 'hide' : 'show';
};

// ── PiP action toast ──────────────────────────────────────────────────
let pipToastTimer = null;
function pipAction(msg, color) {
  const el = document.getElementById('pip-action');
  el.textContent = msg;
  el.style.color = color || 'var(--text)';
  el.classList.add('show');
  clearTimeout(pipToastTimer);
  pipToastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

// ── Keyboard ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const idx = AGENTS.findIndex(a=>a.id===selectedId);
  if (e.key==='ArrowRight') window._select(AGENTS[(idx+1)%AGENTS.length].id);
  if (e.key==='ArrowLeft')  window._select(AGENTS[(idx-1+AGENTS.length)%AGENTS.length].id);
  if (e.key==='j'||e.key==='J') {
    const red = AGENTS.find(a=>a.state==='waiting'||a.state==='permission');
    if (red) { window._select(red.id); pipAction('⚡ jump to waiting', 'var(--waiting)'); }
  }
  if (e.key==='g'||e.key==='G') window.toggleGesture();
  if (e.key==='v'||e.key==='V') window.toggleVoice();
  if (e.key==='l'||e.key==='L') {
    const layouts = ['fleet','focus','pair','review'];
    if (window._layoutIdx === undefined) window._layoutIdx = 0;
    else window._layoutIdx = (window._layoutIdx + 1) % layouts.length;
    window.setLayoutBtn(layouts[window._layoutIdx]);
  }
});

// ── Gesture camera + engine ────────────────────────────────────────────
let engine, renderer, stream, handLandmarker, lastVideoTime=-1;
const pipVideo  = document.getElementById('pip-video');
const pipCanvas = document.getElementById('pip-canvas');
const EXTEND    = 0.12;

window.startGestureCamera = async function() {
  document.getElementById('pip-no-cam').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:640}, height:{ideal:480}, facingMode:'user' }
    });
    pipVideo.srcObject = stream;
    await pipVideo.play();
    document.getElementById('btn-gesture').classList.add('active');
    gestureOn = true;
    initEngine();
    requestAnimationFrame(renderLoop);
  } catch(e) {
    document.getElementById('pip-no-cam').style.display = 'flex';
  }
};

async function initEngine() {
  // Lazy MediaPipe load
  let HandLandmarker, FilesetResolver;
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm');
    HandLandmarker = mod.HandLandmarker;
    FilesetResolver = mod.FilesetResolver;
  } catch {
    // Fall back to global if CDN module import blocked
    return;
  }
  const fs = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');
  handLandmarker = await HandLandmarker.createFromOptions(fs, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numHands: 2,
    minHandDetectionConfidence: 0.5, minHandPresenceConfidence: 0.5, minTrackingConfidence: 0.5
  });
  engine = new GestureEngine({ gestureConfirmFrames:3, swipeVelocityThreshold:0.022, smoothingFactor:0.7 });
  renderer = new GestureRenderer(pipCanvas, {
    mirror: true, background: 'video',
    showSkeleton:true, showLandmarks:true, showLabels:true, showTrails:true,
    showPinchCircle:true, showCursor:true, showMesh:false,
    handColors: {
      Left:  { primary:'#a78bfa', secondary:'#6c5ce7', glow:'rgba(167,139,250,0.4)', mesh:'rgba(167,139,250,0.06)' },
      Right: { primary:'#00d2ff', secondary:'#0088aa', glow:'rgba(0,210,255,0.4)',   mesh:'rgba(0,210,255,0.06)' }
    }
  });
  bindEvents();
}

function bindEvents() {
  engine.on('frame', ({ hand, gesture }) => {
    const nameEl = document.getElementById(hand==='Right'?'pip-right':'pip-left');
    const confEl = document.getElementById(hand==='Right'?'pip-right-conf':'pip-left-conf');
    if (nameEl) nameEl.textContent = gesture?.name || '—';
    if (confEl) {
      const c = (gesture?.confidence||0)*100;
      confEl.style.width = c+'%';
      confEl.className = 'pip-conf-fill '+(c>80?'high':c>55?'mid':'low');
    }
  });

  engine.on('gestureStart', ({ hand, gesture }) => {
    const g = gesture?.name;
    if (!g) return;
    if (hand==='Right') {
      const idx = AGENTS.findIndex(a=>a.id===selectedId);
      if (g==='SWIPE_RIGHT') { window._select(AGENTS[(idx+1)%AGENTS.length].id); pipAction('→ next window','var(--cyan)'); }
      if (g==='SWIPE_LEFT')  { window._select(AGENTS[(idx-1+AGENTS.length)%AGENTS.length].id); pipAction('← prev window','var(--cyan)'); }
    }
    if (hand==='Left') {
      if (g==='POINT')       { window.toggleVoice(); pipAction('🎙 voice toggle','var(--accent)'); }
      if (g==='THREE')       { const red=AGENTS.find(a=>a.state==='waiting'||a.state==='permission'); if(red){window._select(red.id);pipAction('⚡ jump waiting','var(--waiting)');} }
      if (g==='THUMBS_UP')   { const a=AGENTS.find(x=>x.id===selectedId); if(a&&a.state==='permission'){a.state='working';a.tool='bash: approved';render();} pipAction('✓ approve','var(--working)'); }
      if (g==='THUMBS_DOWN') { pipAction('✗ reject','var(--waiting)'); }
    }
  });
}

function renderLoop() {
  requestAnimationFrame(renderLoop);
  if (!handLandmarker||!engine||!renderer) return;
  if (pipVideo.paused||pipVideo.ended) return;
  if (pipVideo.currentTime === lastVideoTime) return;
  lastVideoTime = pipVideo.currentTime;

  pipCanvas.width  = pipVideo.videoWidth  || pipVideo.clientWidth;
  pipCanvas.height = pipVideo.videoHeight || pipVideo.clientHeight;

  const results = handLandmarker.detectForVideo(pipVideo, performance.now());
  const handsData = {
    multiHandLandmarks: results.landmarks || [],
    multiHandedness: results.handedness?.map(h=>({label:h[0]?.categoryName||'Right'})) || []
  };

  engine.update(handsData);

  // Edge detection
  const edgeActive = (handsData.multiHandLandmarks||[]).some(lms => {
    const w = lms[0];
    return Math.min(w.x, 1-w.x, w.y, 1-w.y) < 0.10;
  });
  document.getElementById('pip-camera').classList.toggle('edge-active', edgeActive);

  const remapped = remapExtended(handsData);
  renderer.draw(remapped, engine);
}

function remapExtended(handsData) {
  if (!handsData?.multiHandLandmarks?.length) return handsData;
  const E = EXTEND;
  return { ...handsData, multiHandLandmarks: handsData.multiHandLandmarks.map(lms =>
    lms.map(lm => ({ ...lm, x:(lm.x+E)/(1+E*2), y:(lm.y+E)/(1+E*2) }))
  )};
}

// ── Mock state animation ──────────────────────────────────────────────
setInterval(() => {
  const a = AGENTS[Math.floor(Math.random()*AGENTS.length)];
  if (a.state==='working'&&Math.random()>.72) { a.state=Math.random()>.5?'waiting':'done'; a.tool=null; render(); }
  else if (a.state==='waiting'&&Math.random()>.8) { a.state='working'; a.tool='bash: running...'; render(); }
  else if (a.state==='done'&&Math.random()>.9) { a.state='idle'; render(); }
}, 3500);

// Initial render
render();
</script>
