<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>gmux · Fleet View</title>
<style>
:root {
  --bg:         #07090f;
  --surface:    #0d1117;
  --card:       #0f1419;
  --border:     rgba(255,255,255,0.06);
  --border-hi:  rgba(255,255,255,0.10);
  --muted:      #6e7681;
  --text:       #e6edf3;
  --accent:     #6c5ce7;
  --accent-dim: rgba(108,92,231,0.15);
  --cyan:       #00d2ff;
  --waiting:    #ef4444;
  --working:    #22c55e;
  --permission: #f97316;
  --done:       #3b82f6;
  --error:      #ef4444;
  --idle:       #4b5563;

  --glass-bg:     rgba(13,17,23,0.80);
  --glass-blur:   blur(14px) saturate(180%);
  --glass-border: 1px solid rgba(255,255,255,0.07);
  --glass-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset,
                  0 4px 12px rgba(0,0,0,0.5),
                  0 12px 32px rgba(0,0,0,0.3);

  --topbar-h:    48px;
  --statusbar-h: 26px;
  --sidebar-w:   220px;
  --card-radius: 10px;
  --row-height:  32px;
  --gap:         8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Pro Text', 'Inter', system-ui, sans-serif;
  font-size: 13px;
  overflow: hidden;
  user-select: none;
}

/* ── App Shell ── */
#app {
  display: grid;
  grid-template-rows: var(--topbar-h) 1fr var(--statusbar-h);
  height: 100vh; overflow: hidden;
}

/* ── Topbar ── */
#topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: var(--glass-border);
  overflow: hidden;
}
.brand {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 800; letter-spacing: -0.03em;
  color: var(--text);
  padding-right: 14px; border-right: 1px solid var(--border);
  margin-right: 4px; flex-shrink: 0;
}
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse-glow 2.5s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.35); }
}

/* Layout mode tabs */
#layout-tabs { display: flex; gap: 2px; flex-shrink: 0; }
.layout-tab {
  padding: 5px 11px; border-radius: 6px;
  border: 1px solid transparent;
  font-size: 11px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all 120ms ease;
  background: none;
  font-family: inherit;
  white-space: nowrap;
}
.layout-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.layout-tab.active { color: var(--text); background: var(--accent-dim); border-color: rgba(108,92,231,0.3); }

/* Window tabs (tmux windows) */
#window-tabs {
  display: flex; gap: 2px; flex: 1;
  overflow-x: auto; overflow-y: hidden; scrollbar-width: none; padding: 0 6px;
}
#window-tabs::-webkit-scrollbar { display: none; }
.win-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 0 10px; height: 28px; border-radius: 5px;
  border: 1px solid transparent; color: var(--muted);
  font-size: 11px; font-weight: 500; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  transition: all 120ms ease; background: none; font-family: inherit;
}
.win-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.win-tab.active { color: var(--text); background: rgba(255,255,255,0.06); border-color: var(--border-hi); }
.state-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  transition: background 300ms ease, box-shadow 300ms ease;
}

/* Right controls */
#topbar-right {
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0; margin-left: 6px;
  padding-left: 10px; border-left: 1px solid var(--border);
}
.ctrl-btn {
  padding: 4px 10px; border-radius: 5px;
  border: 1px solid var(--border); color: var(--muted);
  font-family: inherit; font-size: 11px; font-weight: 600;
  background: none; cursor: pointer;
  transition: all 120ms ease; white-space: nowrap;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--border-hi); }
.ctrl-btn.active { color: #a78bfa; border-color: rgba(167,139,250,0.35); background: rgba(108,92,231,0.12); }

/* ── Main area ── */
#main {
  display: flex; overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface);
  border-right: var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-section-label {
  padding: 14px 14px 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted);
}
#agent-list { flex: 1; overflow-y: auto; padding-bottom: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.sidebar-agent {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; height: var(--row-height);
  cursor: pointer; transition: background 100ms ease;
  border-radius: 0;
}
.sidebar-agent:hover { background: rgba(255,255,255,0.03); }
.sidebar-agent.active { background: rgba(255,255,255,0.05); }
.sa-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sa-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sa-state-label { font-size: 10px; font-weight: 600; letter-spacing: 0.03em; flex-shrink: 0; }
.sa-badge {
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
}

/* ── Fleet grid ── */
#content {
  flex: 1; overflow: auto; padding: 16px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
#fleet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  transition: all 250ms cubic-bezier(0.4,0,0.2,1);
}
/* Layout variants */
#fleet-grid.layout-fleet  { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
#fleet-grid.layout-focus  { grid-template-columns: 1fr; max-width: 640px; margin: 0 auto; }
#fleet-grid.layout-pair   { grid-template-columns: 1fr 1fr; }
#fleet-grid.layout-review { grid-template-columns: 2fr 1fr; }
#fleet-grid.layout-review .agent-card:first-child { grid-row: span 3; }

/* ── Agent Card ── */
.agent-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 200ms ease, box-shadow 200ms ease, transform 120ms ease;
  position: relative; overflow: hidden;
}
.agent-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  opacity: 0; transition: opacity 200ms;
}
.agent-card:hover { transform: translateY(-1px); border-color: var(--border-hi); }
.agent-card:hover::before { opacity: 1; }

/* State-based glow */
.agent-card[data-state="waiting"] {
  border-color: rgba(239,68,68,0.25);
  box-shadow: 0 0 0 1px rgba(239,68,68,0.12), 0 0 20px rgba(239,68,68,0.06);
}
.agent-card[data-state="working"] {
  border-color: rgba(34,197,94,0.2);
  box-shadow: 0 0 0 1px rgba(34,197,94,0.08);
}
.agent-card[data-state="permission"] {
  border-color: rgba(249,115,22,0.35);
  box-shadow: 0 0 0 1px rgba(249,115,22,0.15), 0 0 24px rgba(249,115,22,0.08);
  animation: perm-pulse 1.8s ease-in-out infinite;
}
@keyframes perm-pulse {
  0%,100% { box-shadow: 0 0 0 1px rgba(249,115,22,0.15), 0 0 20px rgba(249,115,22,0.08); }
  50%      { box-shadow: 0 0 0 1px rgba(249,115,22,0.30), 0 0 28px rgba(249,115,22,0.14); }
}
.agent-card[data-state="done"] {
  border-color: rgba(59,130,246,0.18);
  box-shadow: 0 0 0 1px rgba(59,130,246,0.08);
}
.agent-card[data-state="error"] {
  border-color: rgba(239,68,68,0.4);
  box-shadow: 0 0 0 1px rgba(239,68,68,0.2), 0 0 24px rgba(239,68,68,0.1);
}
.agent-card.selected {
  border-color: rgba(108,92,231,0.5) !important;
  box-shadow: 0 0 0 1px rgba(108,92,231,0.25) !important, 0 0 28px rgba(108,92,231,0.12) !important;
}

/* Card header */
.card-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.card-state-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  transition: background 300ms ease;
}
.card-name {
  flex: 1; font-size: 13px; font-weight: 700; color: var(--text);
  letter-spacing: -0.01em; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-state-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
}
.card-perm-btn {
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid rgba(249,115,22,0.4);
  background: rgba(249,115,22,0.12); color: #fb923c;
  cursor: pointer; font-family: inherit;
  transition: all 120ms ease; flex-shrink: 0;
}
.card-perm-btn:hover { background: rgba(249,115,22,0.25); }

/* Progress bar (todos) */
.card-progress { margin-bottom: 10px; }
.progress-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11px; color: var(--muted); margin-bottom: 4px;
}
.progress-meta .done-count { color: var(--text); font-weight: 600; }
.progress-track {
  height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--accent);
  transition: width 500ms cubic-bezier(0.4,0,0.2,1);
}
.progress-fill.working { background: var(--working); }

/* Metrics row */
.card-metrics {
  display: flex; gap: 16px; margin-bottom: 10px;
}
.metric {
  display: flex; flex-direction: column; gap: 2px;
}
.metric-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
.metric-value { font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.metric-value.hot { color: var(--waiting); }

/* Current tool / activity */
.card-activity {
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  min-height: 16px;
}
.activity-dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  background: var(--muted);
}
.activity-dot.working { background: var(--working); animation: activity-blink 1s ease-in-out infinite; }
@keyframes activity-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.activity-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Working shimmer */
.agent-card[data-state="working"] .progress-fill { animation: working-march 1.5s linear infinite; }
@keyframes working-march {
  from { background-position: 0 0; }
  to   { background-position: 40px 0; }
}

/* ── Status bar ── */
#statusbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 14px;
  background: var(--surface);
  border-top: var(--glass-border);
  font-size: 11px; color: var(--muted);
  overflow: hidden;
}
.sb-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
.sb-label { color: var(--text); font-weight: 500; }
#sb-agent-count { margin-left: auto; }

/* ── Keyboard shortcut hint ── */
#kb-hints {
  display: flex; align-items: center; gap: 10px; margin-left: auto;
}
kbd {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 3px; padding: 0 4px; font-family: monospace;
  font-size: 10px; color: var(--muted);
}

/* ── State colours (reusable) ── */
.state-waiting    { background: var(--waiting); }
.state-working    { background: var(--working); animation: working-dot 1.4s ease-in-out infinite; }
.state-permission { background: var(--permission); }
.state-done       { background: var(--done); }
.state-error      { background: var(--error); }
.state-idle       { background: var(--idle); }
.state-not_started { background: var(--idle); }
@keyframes working-dot {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
  50%      { box-shadow: 0 0 0 3px rgba(34,197,94,0); }
}
.text-waiting    { color: var(--waiting); }
.text-working    { color: var(--working); }
.text-permission { color: var(--permission); }
.text-done       { color: var(--done); }
.text-error      { color: var(--error); }
.text-idle       { color: var(--muted); }
.bg-waiting    { background: rgba(239,68,68,0.12);   color: var(--waiting); }
.bg-working    { background: rgba(34,197,94,0.12);   color: var(--working); }
.bg-permission { background: rgba(249,115,22,0.14);  color: var(--permission); }
.bg-done       { background: rgba(59,130,246,0.12);  color: var(--done); }
.bg-error      { background: rgba(239,68,68,0.14);   color: var(--error); }
.bg-idle       { background: rgba(75,85,99,0.15);    color: var(--muted); }
</style>
</head>
<body>
<div id="app">

  <!-- Topbar -->
  <div id="topbar">
    <div class="brand"><div class="brand-dot"></div>gmux</div>

    <div id="layout-tabs">
      <button class="layout-tab active" onclick="setLayout('fleet')">Fleet</button>
      <button class="layout-tab" onclick="setLayout('focus')">Focus</button>
      <button class="layout-tab" onclick="setLayout('pair')">Pair</button>
      <button class="layout-tab" onclick="setLayout('review')">Review</button>
    </div>

    <div id="window-tabs" role="tablist"></div>

    <div id="topbar-right">
      <button class="ctrl-btn" id="btn-gesture" onclick="this.classList.toggle('active')">✋ Gesture</button>
      <button class="ctrl-btn" id="btn-voice"   onclick="this.classList.toggle('active')">🎙 Voice</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section-label">Agents</div>
      <div id="agent-list"></div>
    </div>

    <!-- Fleet grid -->
    <div id="content">
      <div id="fleet-grid" class="layout-fleet"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="sb-session">session · default</span>
    <div class="sb-sep"></div>
    <span id="sb-state-summary"></span>
    <div class="sb-sep"></div>
    <span id="sb-agent-count"></span>
    <div id="kb-hints">
      <kbd>←→</kbd><span>switch</span>
      <kbd>J</kbd><span>jump red</span>
      <kbd>L</kbd><span>layout</span>
      <kbd>Space</kbd><span>select</span>
    </div>
  </div>
</div>

<script>
// ── Mock agent data ────────────────────────────────────────────────────
const MOCK_AGENTS = [
  { id: 'a1', name: 'volkus',    state: 'working',    todos: [6,8],  ram: '1.2 GB', tokens: '847k', tool: 'bash: node build.js',      window: 1 },
  { id: 'a2', name: 'sadiya',    state: 'waiting',    todos: [3,5],  ram: '780 MB', tokens: '312k', tool: null,                        window: 2 },
  { id: 'a3', name: 'research',  state: 'permission', todos: [2,4],  ram: '540 MB', tokens: '1.1m', tool: 'edit: src/main.rs',          window: 3 },
  { id: 'a4', name: 'deepseek',  state: 'working',    todos: [7,9],  ram: '2.1 GB', tokens: '2.3m', tool: 'glob: src/**/*.ts',          window: 4 },
  { id: 'a5', name: 'deploy',    state: 'done',       todos: [5,5],  ram: '3.4 GB', tokens: '430k', tool: null,                        window: 5 },
  { id: 'a6', name: 'gemini',    state: 'idle',       todos: [0,0],  ram: '220 MB', tokens: '0',    tool: null,                        window: 6 },
  { id: 'a7', name: 'haiku',     state: 'working',    todos: [1,3],  ram: '890 MB', tokens: '156k', tool: 'read: docs/GESTURES.md',    window: 7 },
  { id: 'a8', name: 'claude-3',  state: 'error',      todos: [2,6],  ram: '1.8 GB', tokens: '990k', tool: 'error: exit code 1',        window: 8 },
];

let selectedId  = 'a1';
let currentLayout = 'fleet';
const layouts   = ['fleet','focus','pair','review'];
let layoutIdx   = 0;

// ── State colours ──────────────────────────────────────────────────────
const STATE_COLOR = {
  waiting: '#ef4444', working: '#22c55e', permission: '#f97316',
  done: '#3b82f6', error: '#ef4444', idle: '#4b5563', not_started: '#4b5563'
};
function stateColor(s) { return STATE_COLOR[s] || '#4b5563'; }

// ── Render window tabs ─────────────────────────────────────────────────
function renderWindowTabs() {
  const el = document.getElementById('window-tabs');
  el.innerHTML = MOCK_AGENTS.map(a => {
    const col = stateColor(a.state);
    return `<button class="win-tab ${a.id === selectedId ? 'active' : ''}"
      onclick="selectAgent('${a.id}')" style="border-bottom-color:${a.id===selectedId?col:'transparent'}">
      <span class="state-dot" style="background:${col};${a.state==='working'?'animation:working-dot 1.4s ease-in-out infinite':''}"></span>
      ${a.window} · ${a.name}
    </button>`;
  }).join('');
}

// ── Render sidebar ─────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('agent-list');
  el.innerHTML = MOCK_AGENTS.map(a => {
    const col = stateColor(a.state);
    const badgeClass = 'bg-' + a.state;
    const badge = a.state === 'permission' ? '<span class="sa-badge bg-permission">!</span>' : '';
    return `<div class="sidebar-agent ${a.id === selectedId ? 'active' : ''}" onclick="selectAgent('${a.id}')">
      <span class="sa-dot" style="background:${col}"></span>
      <span class="sa-name">${a.name}</span>
      ${badge}
      <span class="sa-state-label ${badgeClass}">${a.state === 'not_started' ? 'off' : a.state}</span>
    </div>`;
  }).join('');
}

// ── Render fleet grid ──────────────────────────────────────────────────
function renderFleet() {
  const grid = document.getElementById('fleet-grid');
  grid.innerHTML = MOCK_AGENTS.map(a => buildCard(a)).join('');
}

function buildCard(a) {
  const col   = stateColor(a.state);
  const tdone = a.todos[0], ttotal = a.todos[1];
  const pct   = ttotal > 0 ? (tdone / ttotal * 100).toFixed(0) : 0;
  const isHot = parseFloat(a.ram) > 2;

  const permBtn = a.state === 'permission'
    ? `<button class="card-perm-btn" onclick="event.stopPropagation();approvePerm('${a.id}')">! Approve</button>` : '';

  const actDot = a.state === 'working'
    ? `<span class="activity-dot working"></span>`
    : `<span class="activity-dot"></span>`;
  const actText = a.tool
    ? `<span class="activity-text">${a.tool}</span>`
    : `<span class="activity-text" style="color:var(--border-hi)">—</span>`;

  const badge = `<span class="card-state-badge bg-${a.state}">${a.state}</span>`;

  return `<div class="agent-card ${a.id === selectedId ? 'selected' : ''}"
    data-state="${a.state}" data-id="${a.id}" onclick="selectAgent('${a.id}')">
    <div class="card-header">
      <span class="card-state-dot" style="background:${col};${a.state==='working'?'animation:working-dot 1.4s ease-in-out infinite':''}"></span>
      <span class="card-name">${a.name}</span>
      ${permBtn || badge}
    </div>
    ${ttotal > 0 ? `
    <div class="card-progress">
      <div class="progress-meta">
        <span>Todos</span>
        <span><span class="done-count">${tdone}</span> / ${ttotal}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${a.state === 'working' ? 'working' : ''}" style="width:${pct}%"></div>
      </div>
    </div>` : ''}
    <div class="card-metrics">
      <div class="metric">
        <span class="metric-label">RAM</span>
        <span class="metric-value ${isHot ? 'hot' : ''}">${a.ram}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Tokens</span>
        <span class="metric-value">${a.tokens}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Window</span>
        <span class="metric-value">${a.window}</span>
      </div>
    </div>
    <div class="card-activity">${actDot}${actText}</div>
  </div>`;
}

// ── Status bar ─────────────────────────────────────────────────────────
function renderStatusBar() {
  const counts = {};
  MOCK_AGENTS.forEach(a => counts[a.state] = (counts[a.state]||0)+1);
  const parts = ['waiting','permission','working','done','error'].filter(s=>counts[s])
    .map(s => `<span class="text-${s}">${counts[s]} ${s}</span>`).join(' · ');
  document.getElementById('sb-state-summary').innerHTML = parts;
  document.getElementById('sb-agent-count').textContent = `${MOCK_AGENTS.length} agents`;
}

// ── Select agent ──────────────────────────────────────────────────────
function selectAgent(id) {
  selectedId = id;
  render();
}

// ── Approve permission ────────────────────────────────────────────────
function approvePerm(id) {
  const a = MOCK_AGENTS.find(x=>x.id===id);
  if (a) { a.state = 'working'; a.tool = 'bash: running...'; render(); }
}

// ── Layout switch ─────────────────────────────────────────────────────
function setLayout(name) {
  currentLayout = name;
  const grid = document.getElementById('fleet-grid');
  grid.className = 'layout-' + name;
  document.querySelectorAll('.layout-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === name);
  });
}

// ── Full render ───────────────────────────────────────────────────────
function render() {
  renderWindowTabs();
  renderSidebar();
  renderFleet();
  renderStatusBar();
}
render();

// ── Keyboard nav ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const idx  = MOCK_AGENTS.findIndex(a => a.id === selectedId);
  if (e.key === 'ArrowRight') selectAgent(MOCK_AGENTS[(idx+1)%MOCK_AGENTS.length].id);
  if (e.key === 'ArrowLeft')  selectAgent(MOCK_AGENTS[(idx-1+MOCK_AGENTS.length)%MOCK_AGENTS.length].id);
  if (e.key === 'j' || e.key === 'J') {
    const red = MOCK_AGENTS.find(a => a.state === 'waiting' || a.state === 'permission');
    if (red) selectAgent(red.id);
  }
  if (e.key === 'l' || e.key === 'L') {
    layoutIdx = (layoutIdx + 1) % layouts.length;
    setLayout(layouts[layoutIdx]);
  }
});

// ── Mock state cycling ────────────────────────────────────────────────
const CYCLE = ['idle','working','waiting','permission','done','error'];
setInterval(() => {
  // Slowly cycle a random agent's state to show animation
  const a = MOCK_AGENTS[Math.floor(Math.random() * MOCK_AGENTS.length)];
  if (a.state === 'working' && Math.random() > 0.7) {
    a.state = Math.random() > 0.5 ? 'waiting' : 'done';
    a.tool = null;
    render();
  } else if (a.state === 'waiting' && Math.random() > 0.8) {
    a.state = 'working';
    a.tool = 'bash: running task...';
    render();
  }
}, 3000);
</script>
